name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          mkdir -p LeadingTiger9.FreelancerMultitool
          cp -r manifest.json project.json content/ LeadingTiger9.FreelancerMultitool/
          zip -r LeadingTiger9.FreelancerMultitool.zip LeadingTiger9.FreelancerMultitool/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LeadingTiger9.FreelancerMultitool.zip